<!DOCTYPE html>
<html>
<head>
  <title>Keypad Calculator</title>
  <style>
    body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
    .calc { width:200px; }
    input { width:100%; height:40px; font-size:18px; text-align:right; margin-bottom:10px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
    button { height:50px; font-size:18px; }
    .equal { grid-column: span 3; background:#4CAF50; color:white; }
  </style>
</head>
<body>

<div class="calc">
  <input id="display" disabled />

  <div class="grid">
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>

    <button onclick="calculate()" class="equal">=</button>
  </div>
</div>

<script>
let current = "";

function press(num) {
  current += num;
  document.getElementById("display").value = current;
}

async function calculate() {
  const res = await fetch('/api/calculate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ input: current })
  });

  const data = await res.json();
  document.getElementById("display").value = data.result;
  current = "";
}
</script>

</body>
</html>
